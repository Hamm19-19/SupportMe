<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hamm Store — Donasi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-dim: #8B6E2A;
    --dark: #0D0D0D;
    --dark2: #161616;
    --dark3: #1F1F1F;
    --text: #F0EDE6;
    --text-muted: #9A9488;
    --border: rgba(201,168,76,0.18);
  }
  html, body { height: 100%; background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
  body::before { content: ''; position: fixed; top: -200px; left: -200px; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%); pointer-events: none; z-index: 0; }
  body::after { content: ''; position: fixed; bottom: -200px; right: -200px; width: 700px; height: 700px; border-radius: 50%; background: radial-gradient(circle, rgba(201,168,76,0.05) 0%, transparent 70%); pointer-events: none; z-index: 0; }
  .page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; position: relative; z-index: 1; }
  .card { width: 100%; max-width: 420px; background: var(--dark2); border: 1px solid var(--border); border-radius: 24px; padding: 2.5rem 2rem; text-align: center; position: relative; animation: fadeUp 0.7s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  .card::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 80px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); border-radius: 2px; }
  .corner { position: absolute; width: 18px; height: 18px; border-color: var(--gold-dim); border-style: solid; opacity: 0.4; }
  .corner.tl { top: 16px; left: 16px; border-width: 1px 0 0 1px; border-radius: 3px 0 0 0; }
  .corner.tr { top: 16px; right: 16px; border-width: 1px 1px 0 0; border-radius: 0 3px 0 0; }
  .corner.bl { bottom: 16px; left: 16px; border-width: 0 0 1px 1px; border-radius: 0 0 0 3px; }
  .corner.br { bottom: 16px; right: 16px; border-width: 0 1px 1px 0; border-radius: 0 0 3px 0; }
  .eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 0.2em; color: var(--gold); text-transform: uppercase; margin-bottom: 1.2rem; }
  .headline { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 500; color: var(--text); line-height: 1.3; margin-bottom: 0.6rem; }
  .headline span { color: var(--gold-light); }
  .subtext { font-size: 14px; font-weight: 300; color: var(--text-muted); line-height: 1.7; margin-bottom: 2rem; padding: 0 0.5rem; }
  .divider { display: flex; align-items: center; gap: 10px; margin-bottom: 1.75rem; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .divider-icon { font-size: 13px; color: var(--gold-dim); }
  .qr-wrapper { display: inline-block; padding: 14px; background: #fff; border-radius: 16px; border: 2px solid rgba(201,168,76,0.3); box-shadow: 0 0 0 6px rgba(201,168,76,0.05); margin-bottom: 1.5rem; animation: pulseGlow 3s ease-in-out infinite; }
  @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 0 6px rgba(201,168,76,0.05); } 50% { box-shadow: 0 0 0 14px rgba(201,168,76,0.10); } }
  .qr-wrapper img { display: block; width: 200px; height: 200px; border-radius: 6px; object-fit: contain; }
  .qr-label { font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold-dim); margin-bottom: 0.4rem; }
  .qr-name { font-family: 'Playfair Display', serif; font-size: 17px; color: var(--gold-light); margin-bottom: 0.3rem; }
  .qr-nmid { font-size: 11px; color: var(--text-muted); letter-spacing: 0.05em; margin-bottom: 1.75rem; font-family: monospace; }
  .apps-row { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 8px; margin-bottom: 1.75rem; }
  .app-chip { font-size: 11px; font-weight: 500; color: var(--text-muted); background: var(--dark3); border: 1px solid rgba(255,255,255,0.06); border-radius: 100px; padding: 5px 12px; letter-spacing: 0.04em; }
  .footer-note { font-size: 12px; color: var(--text-muted); line-height: 1.6; border-top: 1px solid var(--border); padding-top: 1.25rem; opacity: 0.7; }
</style>
</head>
